<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup — ExpenseTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#1a6b4a;--accent-light:#e8f5ee;--accent-mid:#2d9e70;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9d9d98;
  --surface:#ffffff;--bg:#f8f7f4;--border:rgba(0,0,0,0.09);
  --danger:#c0392b;--danger-light:#fdf0ee;
  --info:#1d4ed8;--info-light:#eff6ff;
  --radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111110;--surface:#1c1c1a;--text:#f0efeb;--text2:#a0a09c;--text3:#6b6b67;--border:rgba(255,255,255,0.08);--accent-light:#0d2b1e;--accent:#2fd98a;--accent-mid:#25a96a;--info:#60a5fa;--info-light:#1e2f4f;}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px}

/* Header */
.setup-header{text-align:center;margin-bottom:40px}
.setup-logo{font-size:18px;font-weight:600;letter-spacing:-0.3px;color:var(--text);text-decoration:none;display:inline-block;margin-bottom:6px}
.setup-logo span{color:var(--accent)}

/* Progress */
.progress-wrap{width:100%;max-width:560px;margin-bottom:40px}
.progress-steps{display:flex;justify-content:space-between;position:relative;margin-bottom:8px}
.progress-steps::before{content:'';position:absolute;top:14px;left:14px;right:14px;height:2px;background:var(--border);z-index:0}
.progress-fill{position:absolute;top:14px;left:14px;height:2px;background:var(--accent-mid);z-index:1;transition:width 0.4s ease}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:2}
.prog-dot{width:28px;height:28px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text3);transition:all 0.3s}
.prog-dot.done{background:var(--accent);border-color:var(--accent);color:white}
.prog-dot.active{background:white;border-color:var(--accent-mid);color:var(--accent)}
.prog-label{font-size:11px;color:var(--text3);text-align:center;white-space:nowrap}
.prog-label.active{color:var(--accent);font-weight:500}

/* Card */
.setup-card{width:100%;max-width:560px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.step-icon{font-size:40px;margin-bottom:16px}
.step-title{font-size:22px;font-weight:600;letter-spacing:-0.4px;margin-bottom:8px}
.step-sub{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:28px}

/* Steps content */
.instruction-steps{display:flex;flex-direction:column;gap:14px;margin-bottom:24px}
.instruction-step{display:flex;gap:14px;align-items:flex-start}
.instruction-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:1px}
.instruction-text{font-size:14px;color:var(--text2);line-height:1.6}
.instruction-text a{color:var(--info);text-decoration:none}
.instruction-text a:hover{text-decoration:underline}
.instruction-text strong{color:var(--text)}

.sql-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:20px}
.sql-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.sql-label{font-size:12px;font-weight:500;color:var(--text3);font-family:'DM Mono',monospace}
.sql-copy{padding:5px 12px;background:var(--accent);color:white;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity 0.15s}
.sql-copy:hover{opacity:0.85}
.sql-block{padding:14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);white-space:pre;overflow-x:auto;line-height:1.7}

.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
label{font-size:13px;font-weight:500;color:var(--text2)}
input{padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;width:100%;transition:border 0.15s}
input:focus{border-color:var(--accent-mid)}

.btn-row{display:flex;gap:10px;margin-top:24px}
.btn{padding:11px 22px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);color:white;border-color:var(--accent);flex:1}
.btn-primary:hover{opacity:0.88}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}

.status-msg{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;display:none}
.status-msg.show{display:block}
.status-error{background:var(--danger-light);color:var(--danger);border:1px solid var(--danger)}
.status-success{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid)}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Success step */
.success-list{display:flex;flex-direction:column;gap:12px;margin:24px 0}
.success-item{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text2)}
.success-check{width:24px;height:24px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}

/* User badge */
.user-badge{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:24px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.user-info{flex:1}
.user-email{font-size:13px;font-weight:500}
.user-sub{font-size:11px;color:var(--text3)}
</style>
</head>
<body>

<div class="setup-header">
  <a href="index.html" class="setup-logo">Expense<span>Track</span></a>
</div>

<div class="progress-wrap">
  <div class="progress-steps" id="progressSteps">
    <div class="prog-step"><div class="prog-dot active" id="dot-1">1</div><div class="prog-label active" id="lbl-1">Welcome</div></div>
    <div class="prog-step"><div class="prog-dot" id="dot-2">2</div><div class="prog-label" id="lbl-2">Create DB</div></div>
    <div class="prog-step"><div class="prog-dot" id="dot-3">3</div><div class="prog-label" id="lbl-3">Run SQL</div></div>
    <div class="prog-step"><div class="prog-dot" id="dot-4">4</div><div class="prog-label" id="lbl-4">Connect</div></div>
    <div class="prog-step"><div class="prog-dot" id="dot-5">5</div><div class="prog-label" id="lbl-5">Done!</div></div>
  </div>
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="setup-card" id="setupCard"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ── AUTH CHECK ────────────────────────────────────────────────────
const AUTH_SUPABASE_URL     = 'YOUR_AUTH_SUPABASE_URL';
const AUTH_SUPABASE_ANON_KEY = 'YOUR_AUTH_SUPABASE_ANON_KEY';
const authClient = createClient(AUTH_SUPABASE_URL, AUTH_SUPABASE_ANON_KEY);

const { data: { session } } = await authClient.auth.getSession();
if (!session) { window.location.href = 'auth.html'; }

const user = session.user;
const userId = user.id;
const userEmail = user.email;
const userAvatar = userEmail ? userEmail.slice(0,2).toUpperCase() : 'U';

// Check if already set up
if (localStorage.getItem('et_setup_complete_' + userId)) {
  window.location.href = 'app.html';
}

// ── STEP STATE ────────────────────────────────────────────────────
let currentStep = 1;
const TOTAL_STEPS = 5;

const SQL = `CREATE TABLE expenses (
  id            BIGSERIAL PRIMARY KEY,
  date          DATE NOT NULL,
  month         TEXT, day TEXT,
  item          TEXT DEFAULT '',
  category      TEXT DEFAULT '',
  overall_cat   TEXT NOT NULL,
  outlet        TEXT NOT NULL,
  paid_price    NUMERIC(10,2) NOT NULL,
  actual_price  NUMERIC(10,2),
  payment       TEXT DEFAULT 'Card',
  created_at    TIMESTAMPTZ DEFAULT NOW()
);
ALTER TABLE expenses ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Owner only" ON expenses
  FOR ALL TO anon, authenticated
  USING (true) WITH CHECK (true);
GRANT ALL ON expenses TO anon;
GRANT USAGE ON SEQUENCE expenses_id_seq TO anon;

CREATE TABLE outlets (
  id   BIGSERIAL PRIMARY KEY,
  name TEXT UNIQUE NOT NULL
);
ALTER TABLE outlets ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Owner only" ON outlets
  FOR ALL TO anon, authenticated
  USING (true) WITH CHECK (true);
GRANT ALL ON outlets TO anon;
GRANT USAGE ON SEQUENCE outlets_id_seq TO anon;`;

// ── PROGRESS ──────────────────────────────────────────────────────
function updateProgress(step) {
  const pct = ((step - 1) / (TOTAL_STEPS - 1)) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    const dot = document.getElementById('dot-' + i);
    const lbl = document.getElementById('lbl-' + i);
    dot.className = 'prog-dot' + (i < step ? ' done' : i === step ? ' active' : '');
    dot.textContent = i < step ? '✓' : i;
    lbl.className = 'prog-label' + (i === step ? ' active' : '');
  }
}

// ── STEPS ─────────────────────────────────────────────────────────
const steps = {
  1: () => `
    <div class="step-icon">👋</div>
    <div class="user-badge">
      <div class="user-avatar">${userAvatar}</div>
      <div class="user-info"><div class="user-email">${userEmail}</div><div class="user-sub">Signed in successfully</div></div>
      <span style="color:var(--accent);font-size:13px;font-weight:500">✓</span>
    </div>
    <div class="step-title">Welcome to ExpenseTrack</div>
    <div class="step-sub">Let's get your personal database connected. This takes about 10 minutes and you'll only need to do it once.<br><br>Your expense data will live in <strong>your own free Supabase project</strong> — completely private, completely yours.</div>
    <div class="btn-row"><button class="btn btn-primary" onclick="goStep(2)">Let's get started →</button></div>`,

  2: () => `
    <div class="step-icon">🗄️</div>
    <div class="step-title">Create your Supabase project</div>
    <div class="step-sub">Supabase is a free database platform. Your expenses will be stored here — we have no access to this database.</div>
    <div class="instruction-steps">
      <div class="instruction-step"><div class="instruction-num">1</div><div class="instruction-text">Go to <a href="https://supabase.com" target="_blank">supabase.com</a> and create a free account (or sign in if you have one)</div></div>
      <div class="instruction-step"><div class="instruction-num">2</div><div class="instruction-text">Click <strong>New Project</strong> — name it <strong>expense-tracker</strong></div></div>
      <div class="instruction-step"><div class="instruction-num">3</div><div class="instruction-text">Choose a region closest to you — <strong>EU West (Ireland)</strong> is recommended for UK users</div></div>
      <div class="instruction-step"><div class="instruction-num">4</div><div class="instruction-text">Set a strong database password and click <strong>Create new project</strong></div></div>
      <div class="instruction-step"><div class="instruction-num">5</div><div class="instruction-text">Wait about 1 minute for the project to provision, then come back here</div></div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="goStep(1)">← Back</button>
      <button class="btn btn-primary" onclick="goStep(3)">Project is ready →</button>
    </div>`,

  3: () => `
    <div class="step-icon">⚡</div>
    <div class="step-title">Create your database tables</div>
    <div class="step-sub">Copy this SQL and run it in your Supabase project's SQL Editor. This creates the tables that will store your expenses.</div>
    <div class="instruction-steps" style="margin-bottom:16px">
      <div class="instruction-step"><div class="instruction-num">1</div><div class="instruction-text">In your Supabase project, click <strong>SQL Editor</strong> in the left sidebar</div></div>
      <div class="instruction-step"><div class="instruction-num">2</div><div class="instruction-text">Click <strong>New query</strong>, paste the SQL below, and click <strong>Run</strong></div></div>
      <div class="instruction-step"><div class="instruction-num">3</div><div class="instruction-text">You should see <strong>"Success. No rows returned"</strong> — then come back here</div></div>
    </div>
    <div class="sql-wrap">
      <div class="sql-header">
        <span class="sql-label">SQL Editor</span>
        <button class="sql-copy" onclick="copySQL()">Copy SQL</button>
      </div>
      <div class="sql-block" id="sqlBlock">${SQL}</div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="goStep(2)">← Back</button>
      <button class="btn btn-primary" onclick="goStep(4)">SQL ran successfully →</button>
    </div>`,

  4: () => `
    <div class="step-icon">🔌</div>
    <div class="step-title">Connect your database</div>
    <div class="step-sub">Now paste your Supabase project credentials. These are in your Supabase project under <strong>Project Settings → API</strong>.</div>
    <div class="instruction-steps" style="margin-bottom:20px">
      <div class="instruction-step"><div class="instruction-num">1</div><div class="instruction-text">In Supabase go to <strong>Project Settings</strong> (gear icon) → <strong>API</strong></div></div>
      <div class="instruction-step"><div class="instruction-num">2</div><div class="instruction-text">Copy the <strong>Project URL</strong> and paste below</div></div>
      <div class="instruction-step"><div class="instruction-num">3</div><div class="instruction-text">Copy the <strong>anon / public</strong> key (from the Legacy anon tab) and paste below</div></div>
    </div>
    <div class="status-msg status-error" id="conn-error"></div>
    <div class="status-msg status-success" id="conn-success"></div>
    <div class="form-group"><label>Project URL</label><input type="text" id="setup-url" placeholder="https://xxxxxxxxxxxx.supabase.co"></div>
    <div class="form-group"><label>Anon Key</label><input type="password" id="setup-key" placeholder="eyJhbGci…"></div>
    <div class="btn-row">
      <button class="btn" onclick="goStep(3)">← Back</button>
      <button class="btn btn-primary" id="test-btn" onclick="testAndSave()">Test Connection</button>
    </div>`,

  5: () => `
    <div class="step-icon">🎉</div>
    <div class="step-title">You're all set!</div>
    <div class="step-sub">Your database is connected and ready. Here's what you can do now:</div>
    <div class="success-list">
      <div class="success-item"><div class="success-check">✓</div>Import your existing expenses from Excel CSV</div>
      <div class="success-item"><div class="success-check">✓</div>Scan receipts with AI to add expenses instantly</div>
      <div class="success-item"><div class="success-check">✓</div>View analytics across all your spending categories</div>
      <div class="success-item"><div class="success-check">✓</div>Access your data on any device — phone, tablet, laptop</div>
      <div class="success-item"><div class="success-check">✓</div>Install as a home screen app on your phone</div>
    </div>
    <div class="btn-row"><button class="btn btn-primary" onclick="goToApp()">Go to Dashboard →</button></div>`
};

function renderStep(step) {
  document.getElementById('setupCard').innerHTML = steps[step]();
  updateProgress(step);
  currentStep = step;
}

window.goStep = function(step) { renderStep(step); };

// ── COPY SQL ──────────────────────────────────────────────────────
window.copySQL = function() {
  navigator.clipboard.writeText(SQL).then(() => {
    const btn = document.querySelector('.sql-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy SQL', 2000);
  });
};

// ── TEST CONNECTION ───────────────────────────────────────────────
window.testAndSave = async function() {
  const url = document.getElementById('setup-url').value.trim();
  const key = document.getElementById('setup-key').value.trim();
  if (!url || !key) { showMsg('error', 'Please enter both your Project URL and Anon Key'); return; }

  const btn = document.getElementById('test-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Testing…';

  try {
    const testClient = createClient(url, key);
    const { data, error } = await testClient.from('expenses').select('id').limit(1);
    if (error && error.code !== 'PGRST116') throw error;

    // Save credentials
    localStorage.setItem('et_sb_url_' + userId, url);
    localStorage.setItem('et_sb_key_' + userId, key);
    localStorage.setItem('et_setup_complete_' + userId, 'true');

    showMsg('success', '✓ Connected successfully!');
    setTimeout(() => renderStep(5), 1000);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Test Connection';
    showMsg('error', 'Connection failed: ' + (e.message || 'Check your URL and key'));
  }
};

function showMsg(type, msg) {
  ['conn-error','conn-success'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('show'); }
  });
  const el = document.getElementById('conn-' + type);
  if (el) { el.textContent = msg; el.classList.add('show'); }
}

// ── GO TO APP ─────────────────────────────────────────────────────
window.goToApp = function() { window.location.href = 'app.html'; };

// ── INIT ──────────────────────────────────────────────────────────
renderStep(1);
</script>
</body>
</html>
